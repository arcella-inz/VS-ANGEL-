<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VS Angels</title>
<style>
body{margin:0;font-family:Georgia,serif;background:repeating-linear-gradient(90deg,#f7c6d8 0,#f7c6d8 40px,#f3b7cd 40px,#f3b7cd 80px);color:#3a2230}
nav{display:flex;justify-content:center;gap:30px;padding:20px;background:#c97aa0}
nav a{color:white;text-decoration:none;font-size:20px}
section{display:none;max-width:1200px;margin:auto;padding:30px;text-align:center}
section.active{display:block}
h1{font-size:60px;font-style:italic}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;margin:30px 0}
.card{background:rgba(255,255,255,.45);border-radius:20px;padding:10px}
img{width:100%;border-radius:16px}
button{font-size:30px;padding:15px 30px;border:none;border-radius:20px;background:#ffe8ef;cursor:pointer}
</style>
</head>
<body>

<nav>
<a href="#" onclick="showPage('home')">Home</a>
<a href="#" onclick="showPage('gallery')">Gallery</a>
<a href="#" onclick="showPage('apply')">Apply</a>
<a href="#" onclick="showPage('about')">About</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
<h1>Become A VS Angel</h1>
<p>Confidence. Beauty. Power.</p>
<button onclick="showPage('apply')">APPLY NOW</button>
</section>

<!-- GALLERY -->
<section id="gallery">
<h1>Gallery</h1>
<div class="grid">
<img src="/mnt/data/B(3).jpg">
<img src="/mnt/data/vs.jpg">
<img src="/mnt/data/vs(4).jpg">
<img src="/mnt/data/vs fashion show.jpg">
</div>
</section>

<!-- APPLY -->
<section id="apply">
<h1>Apply Now</h1>
<p>Fill in your details</p>
<input placeholder="Name"><br><br>
<input placeholder="Age"><br><br>
<input placeholder="Email"><br><br>
<button>Submit</button>
</section>

<!-- ABOUT -->
<section id="about">
<h1>About</h1>
<p>This is a fashion casting experience inspired by runway icons.</p>
</section>

<script>
function showPage(page){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
